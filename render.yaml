# Render blueprint: a persistent Node service running the Fastify API. The frontend is
# hosted on Netlify, which proxies /api/* here (see web/public/_redirects), so Render is
# API-only and never builds the SPA.
#
# Build is just `npm install` — the server runs TypeScript directly via Node's native
# type-stripping, so there is no build step and no devDependencies are needed at runtime.
# (Do NOT add `npm run build` here: NODE_ENV=production makes npm skip devDependencies,
# which the web build needs — that combination is what fails the deploy.)
services:
  - type: web
    # Named to match the existing service URL (drawbridge-web.onrender.com) that
    # web/public/_redirects proxies to. Keep them in sync if you rename.
    name: drawbridge-web
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start --workspace=server
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: PROCORE_ENV
        value: sandbox
      # These are the NETLIFY domain (where the browser actually is), not the Render
      # domain — the browser only ever touches Netlify, which proxies /api/* in here.
      #   WEB_ORIGIN            = https://drawbridge.netlify.app
      #   PROCORE_REDIRECT_URI  = https://drawbridge.netlify.app/api/auth/callback
      - key: WEB_ORIGIN
        sync: false
      - key: PROCORE_REDIRECT_URI
        sync: false
      # Secrets — set in the Render dashboard, never commit them.
      - key: PROCORE_CLIENT_ID
        sync: false
      - key: PROCORE_CLIENT_SECRET
        sync: false
      # 32 bytes hex (64 chars): openssl rand -hex 32
      - key: SESSION_ENCRYPTION_KEY
        sync: false
